name: Test Doxygen Generation

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  docs-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure doc directory and Doxyfile exist
        run: |
          mkdir -p doc
          if [ ! -f doc/Doxyfile ]; then
            printf '%s\n' \
              'PROJECT_NAME           = "Project Documentation"' \
              'OUTPUT_DIRECTORY       = doc' \
              'GENERATE_HTML          = YES' \
              'HTML_OUTPUT            = html' \
              'GENERATE_LATEX         = NO' \
              'RECURSIVE              = YES' \
              'INPUT                  = .' \
              'EXCLUDE                = doc' \
              'QUIET                  = YES' \
              > doc/Doxyfile
          fi

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen Docs
        run: doxygen doc/Doxyfile

      - name: Verify generated docs
        run: |
          ls -la doc
          ls -la doc/html
          test -f doc/html/index.html

      - name: Upload Doxygen HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: doc/html
